name: Lint and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint the Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12 --quiet

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Lint and Format Check
        run: |
          ruff check . --output-format=github
          ruff format --check .
